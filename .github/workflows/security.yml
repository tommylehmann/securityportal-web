# Security scanning workflow for securityportal-web (C-6 / SA-16).
#
# Runs on every push and pull request to main, and on a weekly schedule so
# newly-published advisories for unchanged code are caught promptly.
#
# Jobs:
#   audit   — npm audit: known-vuln scan for production dependencies.
#   sbom    — CycloneDX SBOM generation (@cyclonedx/cyclonedx-npm); artifact uploaded.
#
# Secret scanning (gitleaks) runs in ci.yml so it covers every change, not just
# dependency changes. This workflow is the PR/push GATE; continuous (scheduled)
# image/CVE monitoring that files a tracking issue lives in
# supply-chain-monitor.yml. Third-party actions are pinned to a full commit SHA
# (Dependabot keeps the comment version current).

name: Security — Web

on:
  push:
    branches: ["main", "master"]
    paths:
      - "package.json"
      - "package-lock.json"
      - "src/**"
      - ".github/workflows/security.yml"
  pull_request:
    paths:
      - "package.json"
      - "package-lock.json"
      - "src/**"
      - ".github/workflows/security.yml"
  schedule:
    # Weekly on Monday 06:15 UTC — offset from the API job to spread load.
    - cron: "15 6 * * 1"

jobs:
  audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          # conventions.md: Node >= 20; use current LTS.
          node-version: "lts/*"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        # --omit=dev limits the audit to packages that ship to users. Dev-only
        # vulnerabilities in build/test tools are reported separately below but do
        # not fail the gate (they cannot reach the browser bundle).
        run: npm audit --omit=dev

      - name: Audit all dependencies (informational)
        # Run the full audit for visibility; failures here are informational only
        # (dev-dep vulns cannot reach production). Use `continue-on-error` so this
        # step surfaces counts without blocking the overall job.
        run: npm audit || true

  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          # conventions.md: Node >= 20; use current LTS.
          node-version: "lts/*"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install @cyclonedx/cyclonedx-npm
        # CycloneDX for npm generates a CycloneDX SBOM from package-lock.json.
        # Installed globally here so it is available as a CLI command.
        # Pinned to a major version so the CLI surface (flags) cannot drift
        # underneath CI on an unpinned global install.
        run: npm install -g @cyclonedx/cyclonedx-npm@5

      - name: Generate SBOM
        run: |
          cyclonedx-npm \
            --output-format JSON \
            --output-file securityportal-web-sbom.cdx.json \
            --omit dev

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: securityportal-web-sbom
          path: securityportal-web-sbom.cdx.json
          retention-days: 90
