# Build & publish the securityportal-web release artifacts.
#
# Trigger: pushing an annotated SemVer tag (vX.Y.Z) — see RELEASING.md.
# workflow_dispatch is supported for dry runs: it builds and pushes an image
# tagged from `git describe`, but does NOT create a GitHub Release.
#
# Outputs:
#   - Container image -> ghcr.io/<owner>/securityportal-web  (multi-tag)
#   - Build-provenance + SBOM attestations on the pushed image digest (keyless,
#     via OIDC — verifiable with `gh attestation verify oci://<image> --owner <owner>`)
#   - GitHub Release with SPDX & CycloneDX SBOMs (the image is the deploy unit)
#
# The version is baked into the bundle at build time (PUBLIC_APP_VERSION ->
# __APP_VERSION__, shown in the footer) and set as an OCI image label.
#
# Owner is derived from ${{ github.repository_owner }}, so a fork publishes under
# the fork's own namespace with no edits and no secrets beyond GITHUB_TOKEN.
#
# Actions are pinned to full commit SHAs; the trailing comment is the version
# Dependabot tracks (github-actions ecosystem in .github/dependabot.yml).

name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # create the GitHub Release and upload assets
  packages: write # push the image to GHCR
  id-token: write # keyless signing identity for attestations (OIDC)
  attestations: write # record build-provenance / SBOM attestations

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/securityportal-web

jobs:
  release:
    name: Build & publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Derive version
        id: ver
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            version="${GITHUB_REF_NAME}"
          else
            version="$(git describe --tags --always --dirty)"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Building version: ${version}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags + OCI labels)
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}
          labels: |
            org.opencontainers.image.version=${{ steps.ver.outputs.version }}

      - name: Build & push image
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ./Dockerfile
          # linux/amd64 only by default — matches the compose/Helm deployment
          # target and avoids slow QEMU builds of the SvelteKit toolchain. To add
          # arm64, set: platforms: linux/amd64,linux/arm64
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_VERSION=${{ steps.ver.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: securityportal-web-sbom.spdx.json

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: cyclonedx-json
          output-file: securityportal-web-sbom.cdx.json

      - name: Attest SBOM
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          sbom-path: securityportal-web-sbom.spdx.json
          push-to-registry: true

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          generate_release_notes: true
          files: |
            securityportal-web-sbom.spdx.json
            securityportal-web-sbom.cdx.json
