# Dependabot keeps every pinned dependency current: npm packages, the SHA-pinned
# GitHub Actions, and the digest-pinned base image. Combined with Dependabot
# security updates (enable in repo Settings → Code security), this is the
# "open a PR when something is outdated or vulnerable" half of supply-chain
# monitoring; supply-chain-monitor.yml is the "scan what is deployed" half.
#
# Minor + patch bumps are grouped to cut PR noise; majors come as their own PRs.

version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      npm-minor-patch:
        update-types: ["minor", "patch"]
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    groups:
      actions-minor-patch:
        update-types: ["minor", "patch"]
    commit-message:
      prefix: "chore(ci)"

  - package-ecosystem: docker
    # The web image is built from the root Dockerfile; Dependabot bumps the
    # pinned base-image digest there.
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "chore(docker)"
